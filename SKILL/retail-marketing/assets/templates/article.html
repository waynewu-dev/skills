<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{ARTICLE_TITLE}} - {{BRAND_NAME}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: {{BODY_FONT}};
    font-size: {{BODY_SIZE}};
    color: {{TEXT_COLOR}};
    background: #F5F5F5;
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
  }
  .article-container {
    max-width: 600px;
    margin: 0 auto;
    background: {{WHITE}};
  }

  /* 头部区域 */
  .article-header {
    padding: 0;
    text-align: center;
  }
  .header-banner {
    width: 100%;
    background: linear-gradient(135deg, {{BRAND_COLOR}}, {{BRAND_COLOR_DARK}});
    padding: 40px 24px 32px;
    color: {{WHITE}};
    position: relative;
    overflow: hidden;
  }
  .header-banner.has-hero {
    background: linear-gradient(135deg, {{BRAND_COLOR}}, {{BRAND_COLOR_DARK}}), url({{HERO_IMAGE}}) center/cover no-repeat;
    background-blend-mode: overlay;
  }
  .header-banner::after {
    content: '';
    position: absolute;
    top: -50%;
    right: -30%;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .brand-tag {
    display: inline-block;
    padding: 4px 16px;
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 20px;
    font-size: {{CAPTION_SIZE}};
    margin-bottom: 16px;
    letter-spacing: 2px;
  }
  .article-title {
    font-family: {{TITLE_FONT}};
    font-size: {{TITLE_SIZE}};
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .article-date {
    font-size: {{CAPTION_SIZE}};
    opacity: 0.7;
  }

  /* 正文区域 */
  .article-body {
    padding: 20px 20px 40px;
  }

  /* 内容块样式 */
  .content-section {
    margin-bottom: 24px;
  }
  .content-section:last-child { margin-bottom: 0; }

  .section-heading {
    font-family: {{TITLE_FONT}};
    font-size: {{HEADING_SIZE}};
    font-weight: 700;
    color: {{TEXT_COLOR}};
    margin-bottom: 12px;
    padding-left: 12px;
    border-left: 3px solid {{BRAND_COLOR}};
    line-height: 1.4;
  }
  .section-heading.centered {
    text-align: center;
    border-left: none;
    padding-left: 0;
  }
  .section-heading.centered::after {
    content: '';
    display: block;
    width: 40px;
    height: 3px;
    background: {{BRAND_COLOR}};
    margin: 8px auto 0;
    border-radius: 2px;
  }

  .section-text {
    color: {{TEXT_COLOR}};
    /* 手机阅读优化：段落不长于3行 */
    margin-bottom: 10px;
  }

  /* 高亮文字 */
  .highlight {
    color: {{BRAND_COLOR}};
    font-weight: 600;
  }
  .price-tag {
    display: inline-block;
    background: {{BRAND_COLOR}};
    color: {{WHITE}};
    padding: 2px 10px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 110%;
  }
  .original-price {
    text-decoration: line-through;
    color: {{TEXT_LIGHT}};
    margin-left: 6px;
    font-size: 90%;
  }

  /* 卡片 */
  .product-card {
    background: {{BG_COLOR}};
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .product-card-img {
    width: 90px;
    height: 90px;
    border-radius: 8px;
    background: linear-gradient(135deg, {{BRAND_COLOR_LIGHT}}, {{BRAND_COLOR}});
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: {{WHITE}};
    font-size: {{CAPTION_SIZE}};
    text-align: center;
    padding: 8px;
  }
  .product-card-info {
    flex: 1;
    min-width: 0;
  }
  .product-card-name {
    font-weight: 600;
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .product-card-desc {
    font-size: {{CAPTION_SIZE}};
    color: {{TEXT_LIGHT}};
    margin-bottom: 6px;
  }
  .product-card-price {
    color: {{BRAND_COLOR}};
    font-weight: 700;
    font-size: 16px;
  }

  /* 特性列表 */
  .feature-list {
    list-style: none;
  }
  .feature-list li {
    padding: 8px 0;
    border-bottom: 1px dashed {{BORDER_COLOR}};
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .feature-list li:last-child { border-bottom: none; }
  .feature-icon {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: {{BRAND_COLOR}};
    color: {{WHITE}};
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
  }

  /* 引用/金句 */
  .quote-block {
    background: {{BG_COLOR}};
    border-left: 3px solid {{ACCENT_COLOR}};
    padding: 14px 18px;
    margin: 18px 0;
    border-radius: 0 8px 8px 0;
    font-style: italic;
    color: {{TEXT_LIGHT}};
  }

  /* 数字亮点 */
  .stat-grid {
    display: flex;
    gap: 10px;
    margin: 18px 0;
  }
  .stat-item {
    flex: 1;
    text-align: center;
    padding: 14px 8px;
    background: {{BG_COLOR}};
    border-radius: 10px;
  }
  .stat-number {
    font-size: 24px;
    font-weight: 800;
    color: {{BRAND_COLOR}};
  }
  .stat-label {
    font-size: {{CAPTION_SIZE}};
    color: {{TEXT_LIGHT}};
    margin-top: 2px;
  }

  /* 分隔线 */
  .divider {
    text-align: center;
    margin: 24px 0;
    color: {{BORDER_COLOR}};
    font-size: {{CAPTION_SIZE}};
    letter-spacing: 4px;
  }

  /* 正文图片 */
  .article-image {
    margin: 20px 0;
    border-radius: 8px;
    overflow: hidden;
  }
  .article-image img {
    width: 100%;
    display: block;
    border-radius: 8px;
  }
  .article-image.full-width {
    margin: 0;
    border-radius: 0;
  }
  .article-image.full-width img {
    border-radius: 0;
  }
  .image-caption {
    display: block;
    text-align: center;
    font-size: {{CAPTION_SIZE}};
    color: {{TEXT_LIGHT}};
    margin-top: 8px;
    line-height: 1.5;
  }

  /* 产品卡片图片（真实图片覆盖纯色背景） */
  .product-card-img.has-image {
    background-size: cover !important;
    background-position: center !important;
    color: transparent !important;
  }

  /* 图片占位 */
  .image-placeholder {
    width: 100%;
    border-radius: 8px;
    background: linear-gradient(135deg, {{BG_COLOR}}, {{BORDER_COLOR}});
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    color: {{TEXT_LIGHT}};
    font-size: {{CAPTION_SIZE}};
    margin: 14px 0;
  }

  /* CTA 区域 */
  .cta-section {
    background: linear-gradient(135deg, {{BRAND_COLOR}}, {{BRAND_COLOR_DARK}});
    border-radius: 12px;
    padding: 24px 20px;
    text-align: center;
    color: {{WHITE}};
    margin: 28px 0 10px;
  }
  .cta-text {
    font-size: {{HEADING_SIZE}};
    font-weight: 700;
    margin-bottom: 6px;
  }
  .cta-sub {
    font-size: {{CAPTION_SIZE}};
    opacity: 0.85;
    margin-bottom: 16px;
  }
  .cta-button {
    display: inline-block;
    background: {{WHITE}};
    color: {{BRAND_COLOR}};
    padding: 10px 36px;
    border-radius: 24px;
    font-weight: 700;
    font-size: {{BODY_SIZE}};
    text-decoration: none;
    letter-spacing: 1px;
  }

  /* 页脚 */
  .article-footer {
    background: {{BG_COLOR}};
    padding: 24px 20px;
    text-align: center;
    border-top: 1px solid {{BORDER_COLOR}};
  }
  .footer-brand {
    font-size: {{CAPTION_SIZE}};
    color: {{TEXT_LIGHT}};
    margin-top: 6px;
  }
  .footer-logo {
    height: 24px;
    margin-bottom: 4px;
    opacity: 0.6;
  }
  .qr-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-top: 14px;
  }
  .qr-code {
    width: 80px;
    height: 80px;
    background: {{WHITE}};
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: {{TEXT_LIGHT}};
  }
  .qr-info {
    font-size: {{CAPTION_SIZE}};
    color: {{TEXT_LIGHT}};
    text-align: left;
  }
</style>
</head>
<body>
<div class="article-container">

  <!-- 头部 -->
  <div class="article-header">
    <div class="header-banner">
      <div class="brand-tag">{{BRAND_NAME}}</div>
      <h1 class="article-title">{{ARTICLE_TITLE}}</h1>
      <div class="article-date">{{ARTICLE_DATE}}</div>
    </div>
  </div>

  <!-- 正文 -->
  <div class="article-body">
    {{CONTENT_BLOCKS}}
  </div>

  <!-- CTA -->
  <div class="cta-section">
    <div class="cta-text">{{CTA_TEXT}}</div>
  </div>

  <!-- 页脚 -->
  <div class="article-footer">
    <div class="footer-brand">{{BRAND_NAME}} · {{OFFICIAL_NAME}}</div>
  </div>

</div>
</body>
</html>
